<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>P2P Game - Complete</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 0; display: grid; grid-template-columns: 280px 1fr; height: 100vh; }
      aside { padding: 12px; background: #181818; color: #eee; overflow: auto; }
      main { position: relative; }
      #game { width: 100%; height: 100%; display: block; background: #0b1020; }
      .row { margin-bottom: 8px; }
      label { display: block; margin-bottom: 4px; font-weight: 600; }
      input, select, button { width: 100%; padding: 6px 8px; }
      #log { white-space: pre-wrap; font-size: 12px; background: #111; padding: 8px; height: 160px; overflow: auto; }
      .pill { display: inline-block; padding: 2px 6px; background: #333; border-radius: 6px; margin-left: 6px; }
      a, a:hover{color:#eee}
      .toolbar { display: flex; gap: 6px; flex-wrap: wrap; }
      .toolbar button { width: auto; flex: 1; font-size: 12px; padding: 4px 6px; }
      .toggle-row { display: flex; align-items: center; gap: 8px; }
      .toggle-row input[type=checkbox] { width: auto; }
      #chatRow { display: flex; gap: 4px; }
      #chatRow input { flex: 1; }
      #chatRow button { width: auto; padding: 6px 12px; }
      .peer-pings { font-size: 11px; color: #aaa; margin-top: 4px; }
    </style>
  </head>
  <body>
    <aside>
      <div class="row">
        <label>Room</label>
        <input id="room" value="complete-room" />
      </div>
      <div class="row">
        <label>Player ID</label>
        <input id="pid" value="P1" />
      </div>
      <div class="row">
        <label>Signaling Server</label>
        <input id="signaling" value="ws://localhost:8787" placeholder="ws://localhost:8787" />
        <small style="color: #999; font-size: 11px;">For testing with public server, use: wss://wss.getlost.ovh</small>
      </div>
      <div class="row">
        <button id="start">Start</button>
      </div>
      <div class="row toolbar">
        <button id="givePotion">Give potion</button>
        <button id="syncState">Sync full state</button>
      </div>
      <div class="row" id="chatRow">
        <input id="chatInput" placeholder="Send message to all..." disabled />
        <button id="chatSend" disabled>Send</button>
      </div>
      <div class="row toggle-row">
        <input type="checkbox" id="pingToggle" checked />
        <label for="pingToggle" style="margin:0;font-weight:400;">Ping overlay</label>
      </div>
      <div class="row">
        <div>Host: <span id="host" class="pill">-</span></div>
        <div class="peer-pings" id="peerPings"></div>
      </div>
      <div id="log"></div>
      <div class="row">Find <a href="https://github.com/aguiran/p2play-js#readme" target="_blank">full documentation here</a> and <a href="https://github.com/aguiran/p2play-js" target="_blank">Github Repo here</a>.</div>
    </aside>
    <main>
      <canvas id="game"></canvas>
    </main>

    <script type="module">
      import { P2PGameLibrary, WebSocketSignaling } from "/dist/index.js";

      const logEl = document.getElementById('log');
      const log = (m) => { logEl.textContent += m + "\n"; logEl.scrollTop = logEl.scrollHeight; };

      const canvas = document.getElementById('game');
      const ctx = canvas.getContext('2d');
      const resize = () => { canvas.width = canvas.clientWidth; canvas.height = canvas.clientHeight; };
      window.addEventListener('resize', resize);
      resize();

      let multiplayer;
      let id;
      const connected = new Set();
      let myPos = { x: 50, y: 50, z: 0 };
      let myVel = { x: 0, y: 0, z: 0 };
      const peerPings = {};

      const keys = new Set();
      window.addEventListener('keydown', (e) => keys.add(e.code));
      window.addEventListener('keyup', (e) => keys.delete(e.code));

      function playerColor(pid) {
        const colors = ['#66c2a5','#fc8d62','#8da0cb','#e78ac3','#a6d854','#ffd92f'];
        const i = Math.abs([...pid].reduce((a,c)=>a+c.charCodeAt(0),0)) % colors.length;
        return colors[i];
      }

      function drawPlayer(pid, x, y) {
        const color = playerColor(pid);
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(x % canvas.width, y % canvas.height, 12, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = '10px sans-serif';
        ctx.fillText(pid, (x % canvas.width) - 8, (y % canvas.height) - 16);
      }

      function draw() {
        ctx.clearRect(0,0,canvas.width, canvas.height);
        const st = multiplayer?.getState();
        if (!st) return;
        for (const p of Object.values(st.players)) {
          if (p.id === id) continue;
          if (!connected.has(p.id)) continue;
          drawPlayer(p.id, p.position.x, p.position.y);
        }
        if (multiplayer) drawPlayer(id, myPos.x, myPos.y);
      }

      function update(dt) {
        if (!multiplayer) return;
        const speed = 200;
        const v = { x: 0, y: 0, z: 0 };
        if (keys.has('ArrowUp') || keys.has('KeyW')) v.y -= 1;
        if (keys.has('ArrowDown') || keys.has('KeyS')) v.y += 1;
        if (keys.has('ArrowLeft') || keys.has('KeyA')) v.x -= 1;
        if (keys.has('ArrowRight') || keys.has('KeyD')) v.x += 1;
        const len = Math.hypot(v.x, v.y) || 1;
        v.x = v.x/len * speed; v.y = v.y/len * speed;
        myPos.x += v.x * dt;
        myPos.y += v.y * dt;
        myVel.x = v.x; myVel.y = v.y; myVel.z = v.z ?? 0;
        if (v.x || v.y) multiplayer.broadcastMove(id, { x: myPos.x, y: myPos.y, z: myPos.z }, myVel);
      }

      let last = performance.now();
      function loop(now=performance.now()) {
        const dt = (now - last) / 1000; last = now;
        update(dt);
        multiplayer?.tick(now);
        const st = multiplayer?.getState();
        if (st?.players[id]) {
          myPos.x = st.players[id].position.x;
          myPos.y = st.players[id].position.y;
        }
        draw();
        requestAnimationFrame(loop);
      }

      function renderPeerPings() {
        const el = document.getElementById('peerPings');
        const entries = Object.entries(peerPings)
          .filter(([pid]) => pid !== id)
          .map(([pid, ms]) => `${pid}: ${ms}ms`);
        el.textContent = entries.length ? entries.join(' | ') : '';
      }

      document.getElementById('start').onclick = async () => {
        id = document.getElementById('pid').value || 'P1';
        const roomId = document.getElementById('room').value || 'complete-room';
        const signalingUrl = document.getElementById('signaling').value || 'ws://localhost:8787';

        const signaling = new WebSocketSignaling(id, roomId, signalingUrl, {
          reconnect: true,
          reconnectOptions: { baseMs: 1000, maxMs: 15000 },
          onError(code) {
            log(`[signaling error] ${code}`);
          },
        });

        multiplayer = new P2PGameLibrary({
          maxPlayers: 8,
          cleanupOnPeerLeave: true,
          pingOverlay: { enabled: true, position: 'top-right' },
          movement: {
            maxSpeed: 300,
            smoothing: 0.15,
            extrapolationMs: 200,
          },
          backpressure: { strategy: 'drop-moves' },
          signaling,
          debug: {
            enabled: true,
            onSend(info) {
              log(`[send] ${info.type} to ${info.to} bytes=${info.payloadBytes} delivered=${info.delivered} queued=${info.queued}`);
            }
          }
        });

        await multiplayer.start();
        connected.clear();
        connected.add(id);
        myPos = { x: 50, y: 50, z: 0 };
        myVel = { x: 0, y: 0, z: 0 };
        Object.keys(peerPings).forEach(k => delete peerPings[k]);

        multiplayer.announcePresence(id, { x: 50, y: 50, z: 0 });

        multiplayer.on('hostChange', (host) => {
          document.getElementById('host').textContent = host;
        });

        multiplayer.on('peerJoin', (pid) => {
          connected.add(pid);
          log(`peerJoin: ${pid}`);
          multiplayer.announcePresence(id, myPos);
        });
        multiplayer.on('peerLeave', (pid) => {
          connected.delete(pid);
          delete peerPings[pid];
          renderPeerPings();
          log(`peerLeave: ${pid}`);
        });

        multiplayer.on('ping', (pid, ms) => {
          peerPings[pid] = ms;
          renderPeerPings();
        });

        multiplayer.on('maxCapacityReached', (max) => {
          log(`[capacity] max players reached (${max})`);
        });

        multiplayer.on('inventoryUpdate', (pid, items) => {
          const mine = pid === id ? ' (me)' : '';
          log(`inventoryUpdate: ${pid}${mine} -> ${items.map(i=>i.id+"x"+i.quantity).join(', ')}`);
        });

        multiplayer.on('objectTransfer', (from, to, item) => {
          log(`objectTransfer: ${from} -> ${to}: ${item.id} x${item.quantity}`);
        });

        multiplayer.on('stateSync', (state) => {
          try { log(`stateSync: players=[${Object.keys(state.players).join(', ')}]`); } catch {}
        });

        multiplayer.on('stateDelta', (delta) => {
          try { log(`stateDelta: tick=${delta.tick} changes=${delta.changes.length}`); } catch {}
        });

        multiplayer.on('sharedPayload', (from, payload, channel) => {
          if (channel === 'chat') {
            log(`[chat] ${from}: ${payload}`);
          } else {
            log(`[payload] from=${from} channel=${channel ?? 'default'} data=${JSON.stringify(payload)}`);
          }
        });

        document.getElementById('chatInput').disabled = false;
        document.getElementById('chatSend').disabled = false;

        loop();
      };

      document.getElementById('givePotion').onclick = () => {
        if (!multiplayer) return;
        const peers = multiplayer.getState().players;
        const ids = Object.keys(peers).filter(pid => pid !== id);
        if (!ids.length) { log('no peers'); return; }
        const to = ids[Math.floor(Math.random()*ids.length)];
        multiplayer.updateInventory(id, [{ id: 'potion', type: 'heal', quantity: 1 }]);
        multiplayer.transferItem(id, to, { id: 'potion', type: 'heal', quantity: 1 });
        log(`transfer potion from ${id} to ${to}`);
      };

      document.getElementById('syncState').onclick = () => {
        if (!multiplayer) return;
        multiplayer.broadcastFullState(id);
        log('[manual] broadcast full state');
      };

      function sendChat() {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text || !multiplayer) return;
        multiplayer.broadcastPayload(id, text, 'chat');
        log(`[chat] ${id}: ${text}`);
        input.value = '';
      }

      document.getElementById('chatSend').onclick = sendChat;
      document.getElementById('chatInput').onkeypress = (e) => {
        if (e.key === 'Enter') sendChat();
      };

      document.getElementById('pingToggle').onchange = (e) => {
        if (!multiplayer) return;
        multiplayer.setPingOverlayEnabled(e.target.checked);
      };
    </script>
  </body>
  </html>
